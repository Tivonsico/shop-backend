<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 天方电竞</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div class="navbar-inner">
        <h1 style="display:flex;align-items:center;"><img src="/ai-icon.png" alt="AI" style="width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;"> 天方电竞</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/login">登录</a>
        </div>
    </div>
</div>

<div class="form-page">
    <div class="form-card">
        <h2>注册</h2>

        <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

        <form method="post" action="/register">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>手机号（选填）</label>
                <input type="text" name="phone">
            </div>
            <button type="submit" class="btn-submit">注 册</button>
        </form>

        <div class="form-footer">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>
</div>

</body>
</html>
