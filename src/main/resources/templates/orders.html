<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 天方电竞</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="navbar">
    <div class="navbar-inner">
        <h1 style="display:flex;align-items:center;"><img src="/ai-icon.png" alt="AI" style="width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;"> 天方电竞</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <span class="username" th:text="${session.username}"></span>
            <a href="/ai">AI助手</a>
            <a href="/logout">退出</a>
        </div>
    </div>
</div>

<div class="container">
    <h2 class="page-title">我的订单</h2>

    <!-- 有订单时 -->
    <div class="order-list" th:if="${!#lists.isEmpty(orderList)}">
        <div class="order-card" th:each="order : ${orderList}">
            <div class="order-card-left">
                <!-- 通过 goodsService 查商品信息 -->
                <img th:src="${goodsService.findById(order.goodsId).get().imageUrl}"
                     th:alt="${goodsService.findById(order.goodsId).get().name}">
                <div class="order-info">
                    <h4 th:text="${goodsService.findById(order.goodsId).get().name}">商品名称</h4>
                    <p>
                        数量：<span th:text="${order.count}">1</span>
                        ｜
                        总价：¥<span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 2)}">99.00</span>
                    </p>
                    <p style="font-size: 12px; color: #bbb;" th:text="${order.createdAt}">时间</p>
                </div>
            </div>
            <div>
                <span class="order-status" th:text="${order.status == 'PAID' ? '已支付' : order.status}">已支付</span>
            </div>
        </div>
    </div>

    <!-- 没有订单时 -->
    <div class="empty-state" th:if="${#lists.isEmpty(orderList)}">
        <p>暂无订单</p>
        <p style="margin-top: 12px;"><a href="/" style="color: #ff5f15;">去逛逛</a></p>
    </div>
</div>

</body>
</html>
