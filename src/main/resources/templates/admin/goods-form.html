<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${goods != null ? '编辑商品' : '添加商品'} + ' - 管理后台'">商品表单</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-nav { background: #1a1a2e; }
        .admin-nav h1 { color: #fff; }
        .admin-layout { display: flex; }
        .admin-sidebar { width: 200px; background: #1a1a2e; min-height: calc(100vh - 64px); padding-top: 20px; }
        .admin-sidebar a { display: block; padding: 14px 24px; color: #b0b0c0; text-decoration: none; font-size: 14px; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.08); color: #fff; }
        .admin-main { flex: 1; padding: 32px; max-width: 700px; }
        .preview-img { width: 200px; height: 200px; object-fit: cover; border-radius: 8px; border: 1px solid #eee; margin-top: 8px; }
    </style>
</head>
<body>

<div class="navbar admin-nav">
    <div class="navbar-inner">
        <h1>天方电竞 · 管理后台</h1>
        <div class="nav-links">
            <a href="/admin/goods">返回商品列表</a>
            <a href="/">返回前台</a>
        </div>
    </div>
</div>

<div class="admin-layout">
    <div class="admin-sidebar">
        <a href="/admin/goods" class="active">商品管理</a>
        <a href="/admin/orders">订单管理</a>
    </div>

    <div class="admin-main">
        <h2 style="font-size: 20px; margin-bottom: 24px;" th:text="${goods != null ? '编辑商品' : '添加商品'}">编辑商品</h2>

        <div class="form-card" style="width: 100%; padding: 32px;">
            <form method="post" th:action="${goods != null ? @{/admin/goods/edit/{id}(id=${goods.id})} : '/admin/goods/add'}" enctype="multipart/form-data">
                <div class="form-group">
                    <label>商品名称</label>
                    <input type="text" name="name" th:value="${goods?.name}" required>
                </div>
                <div class="form-group">
                    <label>商品描述</label>
                    <input type="text" name="description" th:value="${goods?.description}" style="width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px;">
                </div>
                <div class="form-group">
                    <label>价格（元）</label>
                    <input type="number" name="price" step="0.01" th:value="${goods?.price}" required>
                </div>
                <div class="form-group">
                    <label>库存（件）</label>
                    <input type="number" name="stock" min="0" th:value="${goods?.stock}" required>
                </div>
                <div class="form-group">
                    <label>商品图片</label>
                    <input type="file" name="imageFile" accept="image/*">
                    <div th:if="${goods?.imageUrl != null}" style="margin-top: 8px;">
                        <p style="font-size: 12px; color: #999; margin-bottom: 4px;">当前图片：</p>
                        <img class="preview-img" th:src="${goods.imageUrl}">
                    </div>
                </div>
                <button type="submit" class="btn-submit" style="margin-top: 8px;" th:text="${goods != null ? '保存修改' : '添加商品'}">保存</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
