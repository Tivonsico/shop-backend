<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 天方电竞</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-nav { background: #1a1a2e; }
        .admin-nav h1 { color: #fff; }
        .admin-layout { display: flex; }
        .admin-sidebar { width: 200px; background: #1a1a2e; min-height: calc(100vh - 64px); padding-top: 20px; }
        .admin-sidebar a { display: block; padding: 14px 24px; color: #b0b0c0; text-decoration: none; font-size: 14px; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.08); color: #fff; }
        .admin-main { flex: 1; padding: 32px; }
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 20px; }
        .admin-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .admin-table th { background: #fafafa; padding: 14px 16px; text-align: left; font-size: 13px; color: #666; font-weight: 600; border-bottom: 1px solid #f0f0f0; }
        .admin-table td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; vertical-align: middle; }
        .admin-table tr:hover td { background: #fafafa; }
        .admin-table img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-paid { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .empty-row td { text-align: center; padding: 60px 20px; color: #ccc; }
    </style>
</head>
<body>

<div class="navbar admin-nav">
    <div class="navbar-inner">
        <h1>天方电竞 · 管理后台</h1>
        <div class="nav-links">
            <a href="/">返回前台</a>
            <a href="/admin/logout">退出</a>
        </div>
    </div>
</div>

<div class="admin-layout">
    <div class="admin-sidebar">
        <a href="/admin/goods">商品管理</a>
        <a href="/admin/orders" class="active">订单管理</a>
        <a href="/admin/users">用户管理</a>
    </div>

    <div class="admin-main">
        <div class="page-header">
            <h2>订单管理</h2>
            <p style="font-size: 13px; color: #999; margin-top: 4px;">共 <span th:text="${#lists.size(orders)}">0</span> 笔订单</p>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>订单ID</th>
                    <th>商品</th>
                    <th>数量</th>
                    <th>总价</th>
                    <th>用户ID</th>
                    <th>状态</th>
                    <th>下单时间</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="order : ${orders}">
                    <td style="font-family: monospace; font-size: 13px;" th:text="${order.id}">1</td>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <img th:src="${goodsService.findById(order.goodsId).get().imageUrl}">
                            <span th:text="${goodsService.findById(order.goodsId).get().name}">商品名</span>
                        </div>
                    </td>
                    <td th:text="${order.count}">1</td>
                    <td>¥<span th:text="${#numbers.formatDecimal(order.totalPrice, 0, 2)}">99.00</span></td>
                    <td th:text="${order.userId}">1</td>
                    <td>
                        <span class="status-badge status-paid" th:text="${order.status == 'PAID' ? '已支付' : order.status}">已支付</span>
                    </td>
                    <td style="font-size: 13px; color: #999;" th:text="${order.createdAt}">时间</td>
                </tr>
                <tr class="empty-row" th:if="${#lists.isEmpty(orders)}">
                    <td colspan="7">暂无订单</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
