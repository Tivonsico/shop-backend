<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品管理 - 天方电竞</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-nav { background: #1a1a2e; }
        .admin-nav h1 { color: #fff; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .admin-table { width: 100%; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .admin-table th { background: #fafafa; padding: 14px 16px; text-align: left; font-size: 13px; color: #666; font-weight: 600; border-bottom: 1px solid #f0f0f0; }
        .admin-table td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; vertical-align: middle; }
        .admin-table tr:hover td { background: #fafafa; }
        .admin-table img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
        .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 4px; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-edit { background: #1890ff; color: #fff; }
        .btn-edit:hover { background: #40a9ff; }
        .btn-del { background: #ff4d4f; color: #fff; margin-left: 8px; }
        .btn-del:hover { background: #ff7875; }
        .btn-add { background: #ff5f15; color: #fff; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-size: 14px; }
        .btn-add:hover { background: #e55010; }
        .empty-row td { text-align: center; padding: 60px 20px; color: #ccc; }
        .stock-low { color: #ff4d4f; font-weight: 600; }
        .admin-layout { display: flex; }
        .admin-sidebar { width: 200px; background: #1a1a2e; min-height: calc(100vh - 64px); padding-top: 20px; }
        .admin-sidebar a { display: block; padding: 14px 24px; color: #b0b0c0; text-decoration: none; font-size: 14px; transition: all 0.2s; }
        .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.08); color: #fff; }
        .admin-main { flex: 1; padding: 32px; }
    </style>
</head>
<body>

<div class="navbar admin-nav">
    <div class="navbar-inner">
        <h1>天方电竞 · 管理后台</h1>
        <div class="nav-links">
            <a href="/">返回前台</a>
            <a href="/admin/logout">退出</a>
        </div>
    </div>
</div>

<div class="admin-layout">
    <div class="admin-sidebar">
        <a href="/admin/goods" class="active">商品管理</a>
        <a href="/admin/orders">订单管理</a>
        <a href="/admin/users">用户管理</a>
    </div>

    <div class="admin-main">
        <div class="page-header">
            <h2 style="font-size: 20px;">商品管理</h2>
            <a href="/admin/goods/add" class="btn-add">+ 添加商品</a>
        </div>

        <table class="admin-table">
            <thead>
                <tr>
                    <th>图片</th>
                    <th>商品名称</th>
                    <th>价格</th>
                    <th>库存</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="goods : ${goodsList}">
                    <td><img th:src="${goods.imageUrl}" th:alt="${goods.name}"></td>
                    <td th:text="${goods.name}" style="font-weight: 500;">商品名</td>
                    <td>¥<span th:text="${#numbers.formatDecimal(goods.price, 0, 2)}">99.00</span></td>
                    <td>
                        <span th:text="${goods.stock}" th:classappend="${goods.stock < 10 ? 'stock-low' : ''}">100</span>
                    </td>
                    <td>
                        <a class="btn-sm btn-edit" th:href="@{/admin/goods/edit/{id}(id=${goods.id})}">编辑</a>
                        <form method="post" th:action="@{/admin/goods/delete/{id}(id=${goods.id})}" style="display: inline;" onsubmit="return confirm('确定要删除这个商品吗？')">
                            <button type="submit" class="btn-sm btn-del">删除</button>
                        </form>
                    </td>
                </tr>
                <tr class="empty-row" th:if="${#lists.isEmpty(goodsList)}">
                    <td colspan="5">暂无商品，点击右上角添加</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
