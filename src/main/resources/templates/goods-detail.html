<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${goods.name} + ' - 天方电竞'">商品详情</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 支付弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .modal-box .pay-tip {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .modal-box .qrcode-img {
            width: 240px;
            height: 240px;
            object-fit: contain;
            margin-bottom: 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 8px;
        }
        .modal-box .pay-amount {
            font-size: 28px;
            font-weight: 700;
            color: #ff5f15;
            margin-bottom: 4px;
        }
        .modal-box .pay-amount::before {
            content: "¥";
            font-size: 18px;
        }
        .modal-box .pay-order-info {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-paid {
            background: #52c41a;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-paid:hover {
            background: #73d13d;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover {
            background: #e8e8e8;
        }
        .btn-buy {
            background: #ff5f15;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background: #e55010;
        }

        /* 数量输入限制 */
        .count-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .count-wrap input {
            width: 80px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .count-wrap input.count-error {
            border-color: #ff4d4f;
            box-shadow: 0 0 0 2px rgba(255,77,79,0.15);
        }
        .count-tip {
            font-size: 12px;
            color: #ff4d4f;
            display: none;
            white-space: nowrap;
        }
        .count-tip.show {
            display: block;
        }
        .count-tip-negative {
            color: #ff4d4f;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-inner">
        <h1 style="display:flex;align-items:center;"><img src="/ai-icon.png" alt="AI" style="width:28px;height:28px;border-radius:50%;object-fit:cover;margin-right:8px;"> 天方电竞</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <span th:if="${session.userId != null}" class="username" th:text="${session.username}"></span>
            <a th:if="${session.userId != null}" href="/orders">我的订单</a>
            <a th:if="${session.userId != null}" href="/ai">AI助手</a>
            <a th:if="${session.userId != null}" href="/logout">退出</a>
            <a th:if="${session.userId == null}" href="/login">登录</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="goods-detail">
        <!-- 商品图片 -->
        <img th:src="${goods.imageUrl}" th:alt="${goods.name}">

        <!-- 商品信息 -->
        <div class="goods-detail-info">
            <h2 th:text="${goods.name}">商品名称</h2>
            <p class="desc" th:text="${goods.description}">商品描述</p>
            <div class="price-big" th:text="${#numbers.formatDecimal(goods.price, 1, 2)}">99.00</div>
            <div class="stock">库存：<span th:text="${goods.stock}">0</span> 件</div>

            <!-- 错误提示 -->
            <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

            <!-- 购买表单 -->
            <div class="order-form" th:if="${session.userId != null}">
                <input type="hidden" id="goodsId" th:value="${goods.id}">
                <input type="hidden" id="goodsPrice" th:value="${goods.price}">
                <input type="hidden" id="currentUserId" th:value="${session.userId}">
                <label>购买数量：</label>
                <div class="count-wrap">
                    <input type="number" id="buyCount" value="1" min="1" max="100" th:max="${goods.stock}" oninput="checkCount(this)">
                    <div class="count-tip" id="countTip">最多一次性购买 100 个</div>
                    <div class="count-tip count-tip-negative" id="countNegTip">数量不能小于 1</div>
                </div>
                <button type="button" class="btn-buy" onclick="showPayModal()">
                    立即购买
                </button>
            </div>

            <!-- 未登录提示 -->
            <div style="margin-top: 16px; font-size: 13px; color: #999;" th:if="${session.userId == null}">
                <a href="/login" style="color: #ff5f15;">登录</a> 后即可购买
            </div>
        </div>
    </div>
</div>

<!-- ====== 支付弹窗 ====== -->
<div class="modal-overlay" id="payModal">
    <div class="modal-box">
        <!-- === 第一步：选择支付方式 === -->
        <div id="stepSelectMethod">
            <h3>确认订单</h3>

            <div class="pay-amount" id="payAmount">0.00</div>
            <div class="pay-order-info">
                商品：<span id="payGoodsName" th:text="${goods.name}">商品名</span>
                ｜ 数量：<span id="payCount">1</span>
            </div>

            <!-- 微信收款码 -->
            <div style="margin:16px 0;padding:16px;background:#fafafa;border-radius:12px;border:1px solid #eee;">
                <p style="font-size:14px;font-weight:600;margin-bottom:12px;color:#333;">📱 也可直接扫码付款</p>
                <img src="/uploads/wechat-pay.jpg"
                     style="width:200px;height:200px;object-fit:contain;display:block;margin:0 auto 12px;border-radius:8px;"
                     onerror="this.style.display='none'">
                <p style="font-size:13px;color:#666;text-align:center;">
                    支付完联系微信客服：<strong>15251889707</strong>
                </p>
            </div>

            <p style="font-size:14px;color:#999;margin-bottom:12px;">选择支付方式</p>

            <div class="pay-method-list">
                <label class="pay-method-item" onclick="selectMethod('WECHAT')" id="methodWechat">
                    <span style="font-size:24px;margin-right:8px;">💚</span>
                    <span>微信支付</span>
                    <span class="pay-check" id="checkWechat"></span>
                </label>
                <label class="pay-method-item" onclick="selectMethod('ALIPAY')" id="methodAlipay">
                    <span style="font-size:24px;margin-right:8px;">💙</span>
                    <span>支付宝</span>
                    <span class="pay-check" id="checkAlipay"></span>
                </label>
            </div>

            <div class="modal-actions" style="margin-top:20px;">
                <button type="button" class="btn-buy" onclick="confirmPay()" id="btnConfirmPay" disabled>
                    确认支付
                </button>
                <button type="button" class="btn-cancel" onclick="closePayModal()">取消</button>
            </div>
        </div>

        <!-- === 第二步：展示二维码 + 等待支付 === -->
        <div id="stepQrCode" style="display:none;">
            <h3>请扫码支付</h3>
            <p class="pay-tip" id="payMethodLabel">微信支付</p>

            <div style="position:relative;display:inline-block;">
                <img class="qrcode-img" id="qrcodeImg"
                     src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                     alt="二维码加载中...">
                <div id="loadingOverlay"
                     style="position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;border-radius:12px;font-size:14px;color:#999;">
                    生成中...
                </div>
            </div>

            <div class="pay-amount" id="payAmount2">0.00</div>

            <div id="payStatusArea" style="margin:12px 0;">
                <span id="payStatusText" style="color:#ff5f15;font-size:15px;">等待扫码...</span>
            </div>

            <div class="modal-actions" style="flex-direction:column;gap:8px;">
                <button type="button" class="btn-paid" onclick="checkPaymentManually()" id="btnCheckPay">
                    已完成支付 ✓
                </button>
                <button type="button" class="btn-cancel" onclick="cancelPay()">取消订单</button>
            </div>
        </div>

        <!-- === 第三步：支付成功卡片 === -->
        <div id="stepSuccess" style="display:none;">
            <div style="text-align:center;padding:20px 0;">
                <div style="font-size:64px;margin-bottom:16px;">🎉</div>
                <h3 style="font-size:22px;color:#52c41a;margin-bottom:8px;">支付成功！</h3>
                <p style="font-size:14px;color:#666;margin-bottom:20px;">
                    感谢您的购买，我们会尽快处理订单
                </p>
                <div style="background:#fafafa;border-radius:12px;padding:16px;margin-bottom:20px;border:1px solid #eee;">
                    <p style="font-size:14px;color:#333;font-weight:600;margin-bottom:8px;">📦 发货联系微信</p>
                    <p style="font-size:24px;color:#ff5f15;font-weight:700;">15251889707</p>
                    <p style="font-size:12px;color:#999;margin-top:6px;">添加微信时请备注订单号，方便快速发货</p>
                </div>
                <a href="/orders" class="btn-buy" style="text-decoration:none;display:inline-block;padding:12px 40px;">
                    查看订单 →
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .pay-method-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .pay-method-item {
        display: flex;
        align-items: center;
        padding: 14px 16px;
        border: 2px solid #e8e8e8;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
    }
    .pay-method-item:hover {
        border-color: #ccc;
    }
    .pay-method-item.selected {
        border-color: #ff5f15;
        background: #fff8f5;
    }
    .pay-check {
        margin-left: auto;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: transparent;
        transition: all 0.2s;
    }
    .pay-method-item.selected .pay-check {
        background: #ff5f15;
        border-color: #ff5f15;
        color: #fff;
    }
    .qrcode-img {
        width: 250px;
        height: 250px;
        object-fit: contain;
        margin-bottom: 16px;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        padding: 8px;
    }
    .pay-amount {
        font-size: 28px;
        font-weight: 700;
        color: #ff5f15;
        margin-bottom: 4px;
    }
    .pay-amount::before {
        content: "¥";
        font-size: 18px;
    }
    .pay-order-info {
        font-size: 13px;
        color: #bbb;
        margin-bottom: 16px;
    }
</style>

<script>
    let selectedMethod = '';
    let currentOrderId = null;
    let pollTimer = null;

    function checkCount(input) {
        const tip = document.getElementById('countTip');
        const negTip = document.getElementById('countNegTip');
        let val = parseInt(input.value) || 0;
        if (val < 1) {
            input.classList.add('count-error');
            negTip.classList.add('show');
            tip.classList.remove('show');
            input.value = 1;
        } else if (val > 100) {
            input.classList.add('count-error');
            tip.classList.add('show');
            negTip.classList.remove('show');
            input.value = 100;
        } else {
            input.classList.remove('count-error');
            tip.classList.remove('show');
            negTip.classList.remove('show');
        }
    }

    function showPayModal() {
        let count = parseInt(document.getElementById('buyCount').value) || 1;
        if (count > 100) count = 100;
        if (count < 1) count = 1;
        document.getElementById('buyCount').value = count;
        document.getElementById('countTip').classList.remove('show');
        document.getElementById('countNegTip').classList.remove('show');
        document.getElementById('buyCount').classList.remove('count-error');
        const price = parseFloat(document.getElementById('goodsPrice').value) || 0;
        const total = (count * price).toFixed(2);

        // 重置
        selectedMethod = '';
        currentOrderId = null;
        document.getElementById('stepSelectMethod').style.display = 'block';
        document.getElementById('stepQrCode').style.display = 'none';
        document.getElementById('payAmount').textContent = total;
        document.getElementById('payAmount2').textContent = total;
        document.getElementById('payCount').textContent = count;
        document.getElementById('btnConfirmPay').disabled = true;
        document.getElementById('methodWechat').classList.remove('selected');
        document.getElementById('methodAlipay').classList.remove('selected');
        document.getElementById('checkWechat').textContent = '';
        document.getElementById('checkAlipay').textContent = '';
        // 确保 loading 显示
        document.getElementById('loadingOverlay').style.display = 'flex';
        // 显示客服信息
        document.getElementById('payModal').classList.add('show');
    }

    function closePayModal() {
        stopPolling();
        document.getElementById('payModal').classList.remove('show');
    }

    function selectMethod(method) {
        selectedMethod = method;
        document.getElementById('btnConfirmPay').disabled = false;
        if (method === 'WECHAT') {
            document.getElementById('methodWechat').classList.add('selected');
            document.getElementById('methodAlipay').classList.remove('selected');
            document.getElementById('checkWechat').textContent = '✓';
            document.getElementById('checkAlipay').textContent = '';
        } else {
            document.getElementById('methodAlipay').classList.add('selected');
            document.getElementById('methodWechat').classList.remove('selected');
            document.getElementById('checkAlipay').textContent = '✓';
            document.getElementById('checkWechat').textContent = '';
        }
    }

    function confirmPay() {
        if (!selectedMethod) return;
        // 防止重复点击
        var btn = document.getElementById('btnConfirmPay');
        if (btn.disabled) return;
        btn.disabled = true;
        btn.textContent = '处理中...';

        const goodsId = document.getElementById('goodsId').value;
        const count = document.getElementById('buyCount').value;

        // 先创建订单
        fetch('/api/order/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                userId: parseInt(document.getElementById('currentUserId').value) || 0,
                goodsId: parseInt(goodsId),
                count: parseInt(count)
            })
        })
        .then(r => r.json())
        .then(data => {
            if (!data.success) {
                alert('下单失败：' + (data.message || '未知错误'));
                return;
            }
            const order = data.data;
            currentOrderId = order.id;

            // 然后创建支付
            return fetch('/api/payment/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    orderId: currentOrderId,
                    method: selectedMethod
                })
            });
        })
        .then(r => r.json())
        .then(data => {
            if (!data.success) {
                alert('创建支付失败：' + (data.message || '未知错误'));
                return;
            }

            // === 支付宝：跳转到支付宝页面付款 ===
            if (data.method === 'ALIPAY') {
                document.getElementById('stepSelectMethod').style.display = 'none';
                document.getElementById('stepQrCode').style.display = 'block';
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('payMethodLabel').textContent = '正在跳转到支付宝...';
                document.getElementById('qrcodeImg').style.display = 'none';
                document.getElementById('payStatusArea').innerHTML =
                    '<p style="color:#666;font-size:16px;">正在跳转到支付宝付款页面...</p>' +
                    '<p style="color:#999;font-size:13px;margin-top:8px;">如果没有自动跳转，请点击下方按钮</p>';
                var actions = document.querySelector('#stepQrCode .modal-actions');
                actions.innerHTML =
                    '<a href="' + data.redirectUrl + '" class="btn-buy" style="text-decoration:none;">前往支付宝付款 →</a>' +
                    '<button type="button" class="btn-cancel" onclick="closePayModal()">取消</button>';
                // 自动跳转
                window.location.href = data.redirectUrl;
                return;
            }

            // === 微信：显示二维码 + 轮询 ===
            document.getElementById('stepSelectMethod').style.display = 'none';
            document.getElementById('stepQrCode').style.display = 'block';

            const methodLabel = '微信支付';
            document.getElementById('payMethodLabel').textContent = '请使用「' + methodLabel + '」扫码支付';
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('qrcodeImg').src = 'https://api.qrserver.com/v1/create-qr-code/?size=250x250&data='
                + encodeURIComponent(data.qrcode);

            // 开始轮询
            startPolling();
        })
        .catch(err => {
            alert('出错了：' + err.message);
            // 恢复按钮
            document.getElementById('btnConfirmPay').disabled = false;
            document.getElementById('btnConfirmPay').textContent = '确认支付';
        });
    }

    function startPolling() {
        if (!currentOrderId) return;
        document.getElementById('payStatusText').textContent = '等待扫码...';
        pollTimer = setInterval(function() {
            fetch('/api/payment/status/' + currentOrderId)
                .then(r => r.json())
                .then(data => {
                    if (data.status === 'PAID') {
                        stopPolling();
                        showPaySuccess();
                    } else if (data.status === 'CANCELLED') {
                        stopPolling();
                        document.getElementById('payStatusText').textContent = '❌ 订单已取消';
                        document.getElementById('payStatusText').style.color = '#ff4d4f';
                    }
                })
                .catch(function() {});
        }, 2000);
    }

    function stopPolling() {
        if (pollTimer) {
            clearInterval(pollTimer);
            pollTimer = null;
        }
    }

    function showPaySuccess() {
        stopPolling();
        document.getElementById('stepQrCode').style.display = 'none';
        document.getElementById('stepSuccess').style.display = 'block';
    }

    function checkPaymentManually() {
        if (!currentOrderId) return;
        var btn = document.getElementById('btnCheckPay');
        btn.disabled = true;
        btn.textContent = '正在检查支付状态...';
        document.getElementById('payStatusText').textContent = '正在检查支付状态...';
        document.getElementById('payStatusText').style.color = '#999';

        fetch('/api/payment/confirm/' + currentOrderId, { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showPaySuccess();
                } else {
                    return fetch('/api/payment/status/' + currentOrderId)
                        .then(r => r.json())
                        .then(statusData => {
                            if (statusData.status === 'PAID') {
                                showPaySuccess();
                            } else {
                                document.getElementById('payStatusText').textContent = '⏳ 尚未支付，请扫码付款或联系客服';
                                document.getElementById('payStatusText').style.color = '#ff5f15';
                                btn.disabled = false;
                                btn.textContent = '已完成支付 ✓';
                            }
                        });
                }
            })
            .catch(function() {
                document.getElementById('payStatusText').textContent = '❌ 查询失败，联系客服处理';
                document.getElementById('payStatusText').style.color = '#ff4d4f';
                btn.disabled = false;
                btn.textContent = '已完成支付 ✓';
            });
    }

    function cancelPay() {
        if (!currentOrderId) return;
        stopPolling();
        fetch('/api/payment/cancel/' + currentOrderId, { method: 'POST' })
            .then(function() { closePayModal(); })
            .catch(function() { closePayModal(); });
    }

    // 点遮罩关闭
    document.getElementById('payModal').addEventListener('click', function(e) {
        if (e.target === this) closePayModal();
    });

    // 页面离开时停止轮询
    window.addEventListener('beforeunload', function() { stopPolling(); });
</script>

</body>
</html>
