<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${goods.name} + ' - 天方电竞'">商品详情</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* 支付弹窗遮罩 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .modal-box .pay-tip {
            font-size: 14px;
            color: #999;
            margin-bottom: 20px;
        }
        .modal-box .qrcode-img {
            width: 240px;
            height: 240px;
            object-fit: contain;
            margin-bottom: 16px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 8px;
        }
        .modal-box .pay-amount {
            font-size: 28px;
            font-weight: 700;
            color: #ff5f15;
            margin-bottom: 4px;
        }
        .modal-box .pay-amount::before {
            content: "¥";
            font-size: 18px;
        }
        .modal-box .pay-order-info {
            font-size: 13px;
            color: #bbb;
            margin-bottom: 20px;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-paid {
            background: #52c41a;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-paid:hover {
            background: #73d13d;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #666;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover {
            background: #e8e8e8;
        }
        .btn-buy {
            background: #ff5f15;
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-buy:hover {
            background: #e55010;
        }

        /* 数量输入限制 */
        .count-wrap {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .count-wrap input {
            width: 80px;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .count-wrap input.count-error {
            border-color: #ff4d4f;
            box-shadow: 0 0 0 2px rgba(255,77,79,0.15);
        }
        .count-tip {
            font-size: 12px;
            color: #ff4d4f;
            display: none;
            white-space: nowrap;
        }
        .count-tip.show {
            display: block;
        }
        .count-tip-negative {
            color: #ff4d4f;
        }
    </style>
</head>
<body>

<div class="navbar">
    <div class="navbar-inner">
        <h1>天方电竞</h1>
        <div class="nav-links">
            <a href="/">首页</a>
            <span th:if="${session.userId != null}" class="username" th:text="${session.username}"></span>
            <a th:if="${session.userId != null}" href="/orders">我的订单</a>
            <a th:if="${session.userId != null}" href="/ai">AI助手</a>
            <a th:if="${session.userId != null}" href="/logout">退出</a>
            <a th:if="${session.userId == null}" href="/login">登录</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="goods-detail">
        <!-- 商品图片 -->
        <img th:src="${goods.imageUrl}" th:alt="${goods.name}">

        <!-- 商品信息 -->
        <div class="goods-detail-info">
            <h2 th:text="${goods.name}">商品名称</h2>
            <p class="desc" th:text="${goods.description}">商品描述</p>
            <div class="price-big" th:text="${#numbers.formatDecimal(goods.price, 0, 2)}">99.00</div>
            <div class="stock">库存：<span th:text="${goods.stock}">0</span> 件</div>

            <!-- 错误提示 -->
            <div class="error-msg" th:if="${error != null}" th:text="${error}"></div>

            <!-- 购买表单 -->
            <div class="order-form" th:if="${session.userId != null}">
                <input type="hidden" id="goodsId" th:value="${goods.id}">
                <input type="hidden" id="goodsPrice" th:value="${goods.price}">
                <label>购买数量：</label>
                <div class="count-wrap">
                    <input type="number" id="buyCount" value="1" min="1" max="100" th:max="${goods.stock}" oninput="checkCount(this)">
                    <div class="count-tip" id="countTip">最多一次性购买 100 个</div>
                    <div class="count-tip count-tip-negative" id="countNegTip">数量不能小于 1</div>
                </div>
                <button type="button" class="btn-buy" onclick="showPayModal()">
                    立即购买
                </button>
            </div>

            <!-- 未登录提示 -->
            <div style="margin-top: 16px; font-size: 13px; color: #999;" th:if="${session.userId == null}">
                <a href="/login" style="color: #ff5f15;">登录</a> 后即可购买
            </div>
        </div>
    </div>
</div>

<!-- ====== 支付弹窗 ====== -->
<div class="modal-overlay" id="payModal">
    <div class="modal-box">
        <h3>微信支付</h3>
        <p class="pay-tip">请使用微信扫码付款</p>

        <!-- 收款二维码（替换成你自己的微信收款码图片） -->
        <img class="qrcode-img" src="/uploads/wechat-pay.jpg"
             onerror="this.src='https://qcloudimg.tencent-cloud.cn/raw/063123361b3a397f4ba6894591c3a006.png'">

        <p style="font-size: 14px; color: #666; margin-bottom: 12px;">下单后联系vx客服：15251889707</p>

        <div class="pay-amount" id="payAmount">0.00</div>
        <div class="pay-order-info">
            商品：<span id="payGoodsName" th:text="${goods.name}">商品名</span>
            ｜ 数量：<span id="payCount">1</span>
        </div>

        <div class="modal-actions">
            <form method="post" action="/order/create" id="payForm">
                <input type="hidden" name="goodsId" id="payGoodsId" th:value="${goods.id}">
                <input type="hidden" name="count" id="payCountInput">
                <button type="submit" class="btn-paid">已支付 ✓</button>
            </form>
            <button type="button" class="btn-cancel" onclick="closePayModal()">取消</button>
        </div>
    </div>
</div>

<script>
    function checkCount(input) {
        const tip = document.getElementById('countTip');
        const negTip = document.getElementById('countNegTip');
        let val = parseInt(input.value) || 0;
        if (val < 1) {
            input.classList.add('count-error');
            negTip.classList.add('show');
            tip.classList.remove('show');
            input.value = 1;
        } else if (val > 100) {
            input.classList.add('count-error');
            tip.classList.add('show');
            negTip.classList.remove('show');
            input.value = 100;
        } else {
            input.classList.remove('count-error');
            tip.classList.remove('show');
            negTip.classList.remove('show');
        }
    }

    function showPayModal() {
        let count = parseInt(document.getElementById('buyCount').value) || 1;
        if (count > 100) count = 100;
        if (count < 1) count = 1;
        document.getElementById('buyCount').value = count;
        document.getElementById('countTip').classList.remove('show');
        document.getElementById('countNegTip').classList.remove('show');
        document.getElementById('buyCount').classList.remove('count-error');
        const price = parseFloat(document.getElementById('goodsPrice').value) || 0;
        const total = (count * price).toFixed(2);

        document.getElementById('payAmount').textContent = total;
        document.getElementById('payCount').textContent = count;
        document.getElementById('payCountInput').value = count;
        document.getElementById('payGoodsId').value = document.getElementById('goodsId').value;
        document.getElementById('payModal').classList.add('show');
    }

    function closePayModal() {
        document.getElementById('payModal').classList.remove('show');
    }

    // 点遮罩也关闭
    document.getElementById('payModal').addEventListener('click', function(e) {
        if (e.target === this) closePayModal();
    });
</script>

</body>
</html>
