# 服务器端口
server.port=8080

# ========================================
# 默认使用 H2 数据库（本地开发不需要安装）
# 线上部署通过环境变量切换 MySQL
# ========================================
spring.datasource.url=jdbc:h2:file:./data/shopdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA 自动建表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 控制台（本地调试用，线上也可访问）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# 文件上传大小限制（商品图片）
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================================
# 微信支付配置（用环境变量覆盖）
# 申请地址：https://pay.weixin.qq.com/
# ========================================
# 微信小程序/公众号 AppID
wechat.app-id=${WECHAT_APP_ID:}
# 微信商户号（MCH_ID）
wechat.mch-id=${WECHAT_MCH_ID:}
# APIv3 密钥（在商户平台设置）
wechat.api-v3-key=${WECHAT_API_V3_KEY:}
# 商户证书序列号（在商户平台可查看）
wechat.merchant-serial-no=${WECHAT_MERCHANT_SERIAL_NO:}
# 商户私钥（PEM 格式完整内容，含 -----BEGIN PRIVATE KEY-----）
wechat.private-key=${WECHAT_PRIVATE_KEY:}
# 支付回调地址（必须在公网可访问，Railway 自动提供 HTTPS）
wechat.notify-url=${WECHAT_NOTIFY_URL:}

# ========================================
# 支付宝配置（用环境变量覆盖）
# 申请地址：https://open.alipay.com/
# ========================================
# 支付宝应用 ID
alipay.app-id=${ALIPAY_APP_ID:}
# 应用私钥（PKCS8 格式，生成的 merchantPrivateKey）
alipay.app-private-key=${ALIPAY_APP_PRIVATE_KEY:}
# 支付宝公钥（上传应用公钥后在开放平台获取）
alipay.alipay-public-key=${ALIPAY_PUBLIC_KEY:}
# 支付回调地址
alipay.notify-url=${ALIPAY_NOTIFY_URL:}
# 是否使用沙箱（true=沙箱环境，false=正式环境）
alipay.sandbox=${ALIPAY_SANDBOX:true}
