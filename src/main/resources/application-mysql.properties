# MySQL 数据库配置（线上用）
# 激活方式：设置环境变量 SPRING_PROFILES_ACTIVE=mysql
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:shop}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# JPA 自动建表
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 关闭 H2 控制台
spring.h2.console.enabled=false
